# Firebase App Hosting configuration.
# Create the App Hosting backend with repository root set to this web/ directory.
runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "REPLACE_IN_APP_HOSTING_SETTINGS"
    availability:
      - BUILD
      - RUNTIME
